name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Hugging Face Hub
        run: |
          pip install -U huggingface_hub

      - name: Upload to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          hf upload alifya/mineral_classification_demo app.py app.py --repo-type space --token "$HF_TOKEN"
          hf upload alifya/mineral_classification_demo requirements.txt requirements.txt --repo-type space --token "$HF_TOKEN"
          hf upload alifya/mineral_classification_demo README.md README.md --repo-type space --token "$HF_TOKEN"
          hf upload alifya/mineral_classification_demo models/best.pt models/best.pt --repo-type space --token "$HF_TOKEN"
          hf upload alifya/mineral_classification_demo configs/app.yaml configs/app.yaml --repo-type space --token "$HF_TOKEN"
