name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face Hub
        run: |
          pip install -U huggingface_hub

      - name: Prepare Space files
        run: |
          test -f app.py
          test -f README.md
          test -f requirements.txt
          test -f models/best.pt
          test -f configs/app.yaml
          test -d mineral_classifier

          rm -rf space
          mkdir -p space/models space/configs

          cp app.py space/app.py
          cp README.md space/README.md
          cp requirements.txt space/requirements.txt
          cp models/best.pt space/models/best.pt
          cp configs/app.yaml space/configs/app.yaml
          cp -r mineral_classifier space/mineral_classifier

      - name: Upload folder to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          api = HfApi(token=os.environ["HF_TOKEN"])
          api.upload_folder(
              folder_path="space",
              repo_id="alifya/mineral_classification_demo",
              repo_type="space",
              commit_message="Deploy Streamlit mineral classifier",
          )
          PY
